---
# Ansible inventory for Cisco NDFC 4.1 (Nexus Dashboard Fabric Controller)
# Used with the cisco.dcnm collection: https://galaxy.ansible.com/cisco/dcnm
#
# NDFC 4.1 runs on Nexus Dashboard. Point ansible_host at the Nexus Dashboard
# cluster VIP (or a single ND node management IP) and authenticate with a
# local-domain user that has the "network-admin" role on NDFC.
#
# Required collection:
#   ansible-galaxy collection install cisco.dcnm
#
# Required Python deps (on the control node):
#   pip install requests pyyaml

all:
  vars:
    ansible_connection: ansible.netcommon.httpapi
    ansible_network_os: cisco.dcnm.dcnm
    ansible_httpapi_use_ssl: true
    ansible_httpapi_validate_certs: false
    ansible_httpapi_port: 443
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

    # NDFC / Nexus Dashboard credentials (override via Ansible Vault or env vars)
    ansible_user: "{{ lookup('env', 'NDFC_USER') | default('admin', true) }}"
    ansible_password: "{{ lookup('env', 'NDFC_PASSWORD') | default('C1sco12345', true) }}"

    # Login domain on Nexus Dashboard (local, TACACS, RADIUS, LDAP, etc.)
    ansible_httpapi_login_domain: local

  children:

    ndfc:
      hosts:
        ndfc-cluster:
          # VIP of the Nexus Dashboard cluster hosting NDFC
          ansible_host: 15.0.3.157

    # Logical grouping by fabric (managed *through* NDFC, not directly)
    fabrics:
      vars:
        # Fabric-wide defaults you can reference in playbooks
        fabric_type: VXLAN_EVPN
        bgp_asn: 65001
      children:
        site_nyc:
          vars:
            fabric_name: NYC-FABRIC
            site_id: "65025"
          hosts:
            nyc-spine-01: { mgmt_ip: 10.20.1.11, role: spine,        serial_number: FDO00000001 }
            nyc-spine-02: { mgmt_ip: 10.20.1.12, role: spine,        serial_number: FDO00000002 }
            nyc-leaf-01:  { mgmt_ip: 10.20.1.21, role: leaf,         serial_number: FDO00000003 }
            nyc-leaf-02:  { mgmt_ip: 10.20.1.22, role: leaf,         serial_number: FDO00000004 }
            nyc-bgw-01:   { mgmt_ip: 10.20.1.31, role: border_gateway, serial_number: FDO00000005 }
            nyc-bgw-02:   { mgmt_ip: 10.20.1.32, role: border_gateway, serial_number: FDO00000006 }
            nyc-TOR-01:   { mgmt_ip: 10.20.1.33, role: border_gateway, serial_number: FDO00000007 }
            nyc-TOR-02:   { mgmt_ip: 10.20.1.34, role: border_gateway, serial_number: FDO00000008 }

        site_sjc:
          vars:
            fabric_name: SJC-FABRIC
            site_id: "65026"
          hosts:
            sjc-spine-01: { mgmt_ip: 10.30.1.11, role: spine,        serial_number: FDO00000010 }
            sjc-spine-02: { mgmt_ip: 10.30.1.12, role: spine,        serial_number: FDO00000011 }
            sjc-leaf-01:  { mgmt_ip: 10.30.1.21, role: leaf,         serial_number: FDO00000012 }
            sjc-leaf-02:  { mgmt_ip: 10.30.1.22, role: leaf,         serial_number: FDO00000013 }
            sjc-bgw-01:   { mgmt_ip: 10.30.1.31, role: border_gateway, serial_number: FDO00000014 }
            sjc-bgw-02:   { mgmt_ip: 10.30.1.32, role: border_gateway, serial_number: FDO00000015 }
